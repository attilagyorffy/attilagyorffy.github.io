<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <style>
        @font-face {
            font-family: "Source Serif 4";
            src: url("/fonts/source-serif-4-latin.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }
        @font-face {
            font-family: "Source Serif 4";
            src: url("/fonts/source-serif-4-italic-latin.woff2") format("woff2");
            font-weight: 400;
            font-style: italic;
            font-display: block;
        }
        @font-face {
            font-family: "IBM Plex Mono";
            src: url("/fonts/ibm-plex-mono.woff2") format("woff2");
            font-weight: 400;
            font-style: normal;
            font-display: block;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
        }
        body {
            background: oklch(19% 0.012 269);
        }
        .content {
            width: 1200px;
            height: 630px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 100px;
        }
        .name {
            font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
            font-size: 78px;
            font-weight: 400;
            line-height: 1.2;
            color: #ffffff;
            letter-spacing: -0.01em;
            text-wrap: balance;
            margin-bottom: 20px;
        }
        .role {
            font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
            font-style: italic;
            font-size: 32px;
            line-height: 1.35;
            color: #b1b1b1;
            text-wrap: balance;
            margin-bottom: 40px;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: #a89cff;
            margin-bottom: 24px;
        }
        .author {
            font-family: "IBM Plex Mono", Menlo, Consolas, monospace;
            font-size: 20px;
            color: #a89cff;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="name">Attila Gy&ouml;rffy</div>
        <div class="role">Product engineer. First-principles thinker. Two decades of building things and mass-producing opinions.</div>
        <div class="divider"></div>
        <div class="author">attilagyorffy.com</div>
    </div>
</body>
</html>
