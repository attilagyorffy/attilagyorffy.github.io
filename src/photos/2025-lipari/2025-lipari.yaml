title: "Lipari Islands"
slug: "2025-lipari"
date: "2025-09"
date_display: "September 2025"
description: "One hundred and five photographs from the Lipari Islands, September 2025. Volcanic coastlines, harbour towns, and Sicilian light. Shot on a Canon EOS 100D."
country_flag: "\U0001F1EE\U0001F1F9"
album_summary: "Volcanic rock, sulphur vents, and the kind of Mediterranean light that makes everything look like a film still. The whole place smells like eggs and looks like paradise. Every restaurant serves the same caponata and acts like they invented it. They might have. You don't argue with people who live on a volcano."
intro: |
  September 2025. 105 frames from a week on the Aeolian archipelago — volcanic
  rock, sulphur vents, and Mediterranean light that makes everything look like it
  was graded in post. Canon EOS 100D.
cover_images:
  - { src: "web/thumb/073.webp", alt: "Volcanic coastline on the Lipari Islands" }
  - { src: "web/thumb/029.webp", alt: "Mediterranean light on Lipari" }
  - { src: "web/thumb/051.webp", alt: "Street scene on the Aeolian Islands" }
photos:
  - { file: "001", w: 500, h: 333, caption: "Trees clinging to a hill like they owe it money." }
  - { file: "002", w: 500, h: 333, caption: "Someone parked a sailboat in front of what looks like a Bond villain's retirement village." }
  - { file: "003", w: 500, h: 333, caption: "The sun's doing that thing where it hides behind a cloud and pretends it's a movie poster." }
  - { file: "004", w: 333, h: 500, caption: "Same sunset, vertical. Because one wasn't enough to prove I was there." }
  - { file: "005", w: 500, h: 333, caption: "Buildings that look like they've been there longer than democracy, and a bloke in a boat who doesn't care." }
  - { file: "006", w: 500, h: 333, caption: "Another sunset. I know. But look at it. Even I'm not cynical enough to skip this one." }
  - { file: "007", w: 500, h: 333, caption: "A sailing winch. If you don't know what this is, you've never been yelled at on a boat." }
  - { file: "008", w: 500, h: 333, caption: "I collected rocks off a volcano like a child on a school trip. No regrets." }
  - { file: "009", w: 500, h: 333, caption: "Two sailboats pretending they don't know each other." }
  - { file: "010", w: 500, h: 333, caption: "Every influencer's dream shot. I took it by accident." }
  - { file: "011", w: 500, h: 333, caption: "A harbour town at sunset. The boats look more relaxed than I've ever been." }
  - { file: "012", w: 500, h: 333, caption: "More boats. I promise this trip wasn't just boats. It was also volcanoes." }
  - { file: "013", w: 500, h: 333, caption: "Someone's yacht that costs more than everything I'll ever own, combined." }
  - { file: "014", w: 333, h: 500, caption: "An alley so narrow you'd think the buildings were flirting." }
  - { file: "015", w: 333, h: 500, caption: "The kind of gelato selection that makes you question every life decision that didn't lead here sooner." }
  - { file: "016", w: 333, h: 500, caption: "People eating dinner in an alley and pretending it's not weird. It's Italy. Everything's a restaurant." }
  - { file: "017", w: 500, h: 333, caption: "A car the size of a shopping trolley parked outside a bar with a cactus theme. Sicily is unhinged." }
  - { file: "018", w: 500, h: 333, caption: "A random party balloon just floating in the middle of the Mediterranean. Someone's birthday clearly got out of hand." }
  - { file: "019", w: 500, h: 333, caption: "Portorosa at sunset. Looks like the title card of a show where someone gets murdered in episode two." }
  - { file: "020", w: 333, h: 500, caption: "Sailing toward what I'm pretty sure is a volcano. This is fine." }
  - { file: "021", w: 500, h: 333, caption: "Water. Just water. Sometimes you point the camera at nothing and it's still better than your office." }
  - { file: "022", w: 500, h: 333, caption: "Stromboli from the sea. Looks angry. Is angry. Been erupting for two thousand years." }
  - { file: "023", w: 500, h: 333, caption: "A yacht that definitely belongs to someone who says \"it's not about the money.\" And a tiny rock behind it because nature doesn't care about your net worth." }
  - { file: "024", w: 500, h: 333, caption: "Local dog. Did not care about me. Did not care about the camera. Did care about the fence." }
  - { file: "025", w: 500, h: 333, caption: "Someone planted an olive tree in volcanic rocks and put a sign on it. Peak Sicily." }
  - { file: "026", w: 500, h: 333, caption: "A harbour full of boats. Rich people park, poor people gawk. Guess which one I was." }
  - { file: "027", w: 500, h: 333, caption: "Strombolicchio. A rock with a lighthouse on it. The most committed lighthouse in the Mediterranean." }
  - { file: "028", w: 500, h: 333, caption: "White houses overlooking the sea. Everyone who lives here knows they've won." }
  - { file: "029", w: 500, h: 333, caption: "Volcanic hillside at golden hour. Looks like Mars if Mars had a sunset wine bar." }
  - { file: "030", w: 500, h: 333, caption: "A canal full of boats at sunset. Venice if Venice was honest and didn't charge you to exist." }
  - { file: "031", w: 333, h: 500, caption: "Dead trees on a volcano. Nature's way of saying \"I was here first.\"" }
  - { file: "032", w: 333, h: 500, caption: "More volcano. The closer you get, the more you wonder why you're getting closer." }
  - { file: "033", w: 500, h: 333, caption: "Hikers on a zigzag trail up the volcano. Each one of them regretting cardio day." }
  - { file: "034", w: 500, h: 333, caption: "The view from up high. Worth the hike. Don't ask me about the hike." }
  - { file: "035", w: 500, h: 333, caption: "Stromboli's crater. That's smoke. From a volcano. That I walked to. On purpose." }
  - { file: "036", w: 333, h: 500, caption: "Closer. Still smoke. Still a volcano. Still questionable judgement." }
  - { file: "037", w: 500, h: 333, caption: "Sciara del Fuoco — a black sand avalanche chute that drops straight into the sea. Cheerful." }
  - { file: "038", w: 500, h: 333, caption: "Sunset from the top of an active volcano. If this doesn't get you, nothing will." }
  - { file: "039", w: 500, h: 333, caption: "Same sunset, marginally different. I'm not sorry. You try standing on a volcano and not taking fifty photos." }
  - { file: "040", w: 500, h: 333, caption: "The volcano's black slope meeting the sea at sunset. Mordor with better lighting." }
  - { file: "041", w: 500, h: 333, caption: "Yacht masts silhouetted at sunset. If you squint, it looks like modern art." }
  - { file: "042", w: 500, h: 333, caption: "Sunset number — honestly, I've lost count. Still good though." }
  - { file: "043", w: 500, h: 333, caption: "Close-up of volcanic rock. This is what the inside of the earth looks like when it's having a bad day." }
  - { file: "044", w: 500, h: 333, caption: "Lava meets plants. Life finds a way, etc. Jeff Goldblum was right." }
  - { file: "045", w: 500, h: 333, caption: "The sea went so still it forgot it was the sea. I don't know what's water and what's sky." }
  - { file: "046", w: 500, h: 333, caption: "Same. I took three of these. Fight me." }
  - { file: "047", w: 500, h: 333, caption: "Three. I regret nothing." }
  - { file: "048", w: 333, h: 500, caption: "View from the summit. Someone lives in that building down there. Next to a volcano. On purpose." }
  - { file: "049", w: 500, h: 333, caption: "Same view, different moment. A tiny house on the edge of catastrophe. Relatable, honestly." }
  - { file: "050", w: 500, h: 333, caption: "Pink sky over volcanic ridges. Looks fake. Isn't." }
  - { file: "051", w: 500, h: 333, caption: "Coastal town from the sea. The sort of place that makes you question your entire housing situation." }
  - { file: "052", w: 500, h: 333, caption: "Black volcanic slope in black and white. Dramatic? Yes. Subtle? No." }
  - { file: "053", w: 500, h: 333, caption: "THE VOLCANO IS ERUPTING. Actual lava. Coming out of the actual earth. While I'm standing on it." }
  - { file: "054", w: 500, h: 333, caption: "Night eruption. An orange glow on a mountain. The earth is literally on fire and I thought, \"I should photograph this.\"" }
  - { file: "055", w: 500, h: 333, caption: "Lava glow through the grass at night. Or the moon. Or Satan's porch light. Hard to say." }
  - { file: "056", w: 500, h: 333, caption: "Birra dello Stretto. Local beer. Tastes like \"I survived a volcano hike\" in liquid form." }
  - { file: "057", w: 500, h: 333, caption: "A gecko on the ceiling. Watching me. Judging me. Probably right to." }
  - { file: "058", w: 500, h: 333, caption: "Chocolate-covered things on sticks. Italy doesn't do healthy snacks and I respect that deeply." }
  - { file: "059", w: 500, h: 333, caption: "A pile of cannoli shells. Empty. Waiting to be filled. The most Italian metaphor that exists." }
  - { file: "060", w: 500, h: 333, caption: "Strombolicchio again. I can't stop photographing this rock and neither would you." }
  - { file: "061", w: 333, h: 500, caption: "Same rock, different angle. It's got a lighthouse on it. It earned its close-up." }
  - { file: "062", w: 500, h: 333, caption: "A town built on a cliff because flat land is for quitters." }
  - { file: "063", w: 500, h: 333, caption: "The sea stack straight on. A rock that decided it was a monument and no one argued." }
  - { file: "064", w: 500, h: 333, caption: "Moody cliff. Could be an album cover. For something you'd listen to when it's raining." }
  - { file: "065", w: 333, h: 500, caption: "Volcanic cliff with a tower on top. Someone thought, \"I'll build something up there.\" Mad." }
  - { file: "066", w: 500, h: 333, caption: "Strombolicchio silhouette. I've taken twelve photos of this rock. I have a problem." }
  - { file: "067", w: 500, h: 333, caption: "Same rock, further away. Still beautiful. Still a problem." }
  - { file: "068", w: 500, h: 333, caption: "Stromboli's summit puffing away. Like a bloke who says he's quit smoking but hasn't." }
  - { file: "069", w: 500, h: 333, caption: "More volcanic smoke. Closer this time. The earth burping." }
  - { file: "070", w: 333, h: 500, caption: "White yacht, red island, blue water. Someone colour-sorted the Mediterranean." }
  - { file: "071", w: 500, h: 333, caption: "Sea caves. The kind of place where movie villains keep their submarine." }
  - { file: "072", w: 500, h: 333, caption: "Geological layers. Millions of years of the earth going \"I dunno, let's try this colour.\"" }
  - { file: "073", w: 500, h: 333, caption: "Yacht cruising past a beach town. The guy on the yacht will never know how good this photo is." }
  - { file: "074", w: 500, h: 333, caption: "Someone swimming into a sea cave. Brave or stupid. Possibly both." }
  - { file: "075", w: 500, h: 333, caption: "Columnar basalt sea caves. The earth made hexagons. On purpose. Show-off." }
  - { file: "076", w: 333, h: 500, caption: "Volcanic cliff so dramatic it looks Photoshopped. It's not. The earth is just like this sometimes." }
  - { file: "077", w: 500, h: 333, caption: "Close-up of volcanic rock that looks like the surface of another planet. I touched it. It was warm." }
  - { file: "078", w: 500, h: 333, caption: "Fallen volcanic boulders. Every one of these was thrown here by an explosion. Happy holiday." }
  - { file: "079", w: 333, h: 500, caption: "Dark cliff, dark sky, dark mood. The volcano's emo phase." }
  - { file: "080", w: 500, h: 333, caption: "Columnar basalt at the waterline. The earth doing its best impression of a cathedral organ." }
  - { file: "081", w: 333, h: 500, caption: "Inside a sea cave. Stone columns, pebble floor. God's foyer." }
  - { file: "082", w: 333, h: 500, caption: "Another cave. Darker. The kind of place you explore and your mates wait outside because they've seen horror films." }
  - { file: "083", w: 500, h: 333, caption: "Sailboats at twilight. Everyone anchored up and drinking wine. As they should be." }
  - { file: "084", w: 500, h: 333, caption: "Yacht passing sea caves under a cliff town. Three postcards in one frame." }
  - { file: "085", w: 500, h: 333, caption: "Giant rock from sea level at golden hour. Looks like something you'd worship." }
  - { file: "086", w: 500, h: 333, caption: "Secluded black pebble beach. No towels, no umbrellas, no one selling you things. Paradise." }
  - { file: "087", w: 500, h: 333, caption: "Two people sitting on a cliff edge. Either incredibly brave or don't have life insurance." }
  - { file: "088", w: 500, h: 333, caption: "Craggy headland in the mist. Moody as hell. Even the water's brooding." }
  - { file: "089", w: 500, h: 333, caption: "Yacht lit up at night like a floating nightclub. I wasn't invited." }
  - { file: "090", w: 333, h: 500, caption: "Moonlight on the sea. The sort of view that makes you text your ex. Don't." }
  - { file: "091", w: 500, h: 333, caption: "Same moonlight, closer. Still don't text them." }
  - { file: "092", w: 500, h: 333, caption: "An olive tree older than your country. Lit up at night like it knows it." }
  - { file: "093", w: 333, h: 500, caption: "Close-up of the trunk. Been twisting for a thousand years. Still more put-together than me." }
  - { file: "094", w: 500, h: 333, caption: "Another lit-up yacht. I swear I don't only photograph rich people's boats. But they do leave the lights on." }
  - { file: "095", w: 500, h: 333, caption: "A small sailboat doing its thing. Not fancy, not flashy. The kind of boat that has character." }
  - { file: "096", w: 333, h: 500, caption: "The back of a yacht with its tender boat. Even the lifeboat on this thing is nicer than my car." }
  - { file: "097", w: 500, h: 333, caption: "Sailboat and a sea stack in the mist. The opening scene of a film where a fisherman finds a mermaid." }
  - { file: "098", w: 500, h: 333, caption: "Swimmers near volcanic cliffs with a natural rock arch. Instagram would explode." }
  - { file: "099", w: 500, h: 333, caption: "Silhouetted sea stacks against dramatic clouds. This is the photo the camera was built for." }
  - { file: "100", w: 500, h: 333, caption: "Volcanic cliffs in every colour you can get. The earth went through its entire palette and said \"all of them.\"" }
  - { file: "101", w: 500, h: 333, caption: "Closer. Rust, ochre, grey, red. A geology textbook having a midlife crisis." }
  - { file: "102", w: 500, h: 333, caption: "Two dinghies in a quiet bay. The opposite of excitement. Exactly what you need." }
  - { file: "103", w: 500, h: 333, caption: "Storm clouds at dusk. The sky doing a dramatic monologue." }
  - { file: "104", w: 500, h: 333, caption: "The helm. Steering wheel, open sea, nobody telling you where to go. The dream, basically." }
  - { file: "105", w: 500, h: 333, caption: "Catamaran anchored near abandoned buildings on a volcanic island. Looks haunted. Would still buy it." }
