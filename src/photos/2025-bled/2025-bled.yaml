title: "Bled"
slug: "2025-bled"
date: "2025-08"
date_display: "August 2025"
description: "Twenty photographs from Lake Bled, Slovenia, August 2025. Alpine light, still water, and a church on an island. Shot on a Canon EOS 100D with kit lens."
country_flag: "\U0001F1F8\U0001F1EE"
album_summary: "There's a lake. On the lake there's an island. On the island there's a church. It looks like a screensaver and you'd think it's tacky except it's genuinely one of the most beautiful things you've ever seen. Also the cream cake is unreasonably good for something that costs two euros."
intro: |
  August 2025. Slovenia is a country of two million people that somehow has a
  medieval castle on a cliff, glacial water so clear you can count the fish, and
  blokes rowing tourists around in wooden boats like it's the 1800s. The whole
  place looks like someone colour-graded reality and forgot to tell anyone. You
  walk around the lake, eat a cream cake that has no business being that good,
  watch the Julian Alps turn pink at sunset, and quietly start googling property
  prices. 20 frames. Canon EOS 100D.
cover_images:
