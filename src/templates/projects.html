<!doctype html>
<html lang="en">
    <head>
        {{- template "partials/head.html" . }}
        <title>{{ .Title }} — Attila Györffy</title>
        <meta
            name="description"
            content="{{ .Description }}"
        />
        <meta property="og:title" content="{{ .Title }} — Attila Györffy" />
        <meta property="og:description" content="{{ .Description }}" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://www.attilagyorffy.com/projects/" />
        <meta property="og:image" content="https://www.attilagyorffy.com/images/og-default.png" />
        <meta property="og:site_name" content="Attila Györffy" />
        <meta property="og:locale" content="en_GB" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:creator" content="@attilagyorffy" />
        <link rel="stylesheet" href="/stylesheets/pages/blog-listing.css" />
        <script>requestAnimationFrame(()=>{requestAnimationFrame(()=>{if(!window.matchMedia('(prefers-reduced-motion:reduce)').matches)document.documentElement.classList.add('js-animated')})})</script>
    </head>
    <body>
        <main class="page">
            {{ template "nav-home" . }}

            <h1>{{ .Title }}</h1>

            <p class="intro">
                {{ .Intro }}
            </p>

            {{- range .Categories }}
            <section class="post-list">
                <h2>{{ .Name }}</h2>
                {{- range .Projects }}
                <article class="post-item">
                    <h3 class="post-title">
                        <a href="{{ .URL }}" class="post-link" target="_blank" rel="noopener noreferrer">
                            {{ .Title }}
                        </a>
                    </h3>
                    <p class="post-summary">
                        {{ .Summary }}
                    </p>
                </article>
                {{- end }}
            </section>
            {{- end }}

            <footer class="site-footer">
                <p>
                    {{ safeHTML .Footer }}
                </p>
            </footer>
        </main>

        <script src="/javascripts/favicon.js" defer></script>
    </body>
</html>
