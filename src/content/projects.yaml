title: "Projects"
description: "Open source projects, homelab experiments, and the occasional act of mass stubbornness preserved in code. Mostly Go, some Ruby, all of it opinionated."
intro: "A curated selection of things I've built, patched, ported, or stubbornly maintained long after the world moved on. Some solve real problems. Others exist purely because I was annoyed enough to write code about it."
footer: "These are the ones that survived. There's a whole graveyard of abandoned prototypes and questionable decisions on <a href=\"https://github.com/attilagyorffy\">GitHub</a>. Dig through it if you like. Don't say I didn't warn you."
categories:
  - name: "Music & Audio"
    projects:
      - title: "Audiqa"
        url: "https://audiqa.app"
        summary: "Everyone's renting their music now. Good for them. Some of us still own ours and would like a proper app to manage it — one that's fast, local-first, and doesn't phone home every time you press play."
      - title: "Chromaprint, rewritten in Rust"
        url: "https://github.com/attilagyorffy/chromaprint-next"
        summary: "Other people wrote Rust ports of Chromaprint. They produce the wrong fingerprints. This one produces bit-identical output to the C reference and beats it by 4% on throughput — despite the C version using Apple's hardware-accelerated vDSP. You're welcome."
      - title: "Last.fm History Exporter"
        url: "https://github.com/attilagyorffy/lastfm-history"
        summary: "Downloads every scrobble you've ever made to JSON — artist, album, track, timestamp, the lot. Has retry logic because Last.fm's API will absolutely drop your connection after three hours and pretend nothing happened."
  - name: "AI"
    projects:
      - title: "Apple Mail.app MCP Server"
        url: "https://github.com/attilagyorffy/apple-mail-mcp"
        summary: "Lets AI assistants read your email without sending a single token to anyone else's server. Everything stays on your machine. One Go binary, no dependencies, and an audit log because if something's reading my inbox, I'd like receipts."
      - title: "URL Summarizer"
        url: "https://github.com/attilagyorffy/ai-summarizer"
        summary: "Give it a URL, it gives you the gist. No UI, no browser extension, no twelve-step onboarding flow. Just a CLI that reads a page and tells you what it says so you don't have to."
  - name: "Observability"
    projects:
      - title: "NVIDIA GPU Prometheus Exporter"
        url: "https://github.com/attilagyorffy/prometheus-exporter-nvidia-gpu"
        summary: "Scrapes nvidia-smi so your homelab GPU gets a proper Grafana dashboard instead of staring at a terminal like it's 1997."
      - title: "AdGuard Home Prometheus Exporter"
        url: "https://github.com/attilagyorffy/prometheus-exporter-adguard-home"
        summary: "A Prometheus exporter that actually follows the official exporter guidelines — which, apparently, was too much to ask of the existing alternatives."
  - name: "devtools"
    projects:
      - title: "Pow Bonjour Advertiser"
        url: "https://github.com/attilagyorffy/pow-mdns"
        summary: "Broadcasts your Pow dev server over Bonjour so every device on the network just finds it. Written because testing on an iPad meant looking up your IP address every time DHCP felt like reinventing itself."
      - title: "Ember.js extension for Capybara"
        url: "https://github.com/attilagyorffy/capybara-ember"
        summary: "Poltergeist clicked buttons before Ember was ready, so tests either failed randomly or passed for the wrong reasons. This gem monkey-patches the click to wait for the run loop. Require it and your tests start behaving like adults."
