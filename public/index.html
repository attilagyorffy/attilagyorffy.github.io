<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Attila Györffy</title>
        <meta
            name="description"
            content="Software engineer, lifelong learner, and maker of puns. Building things with Go, Ruby, and Rails. Writing, photography, open source projects, and dry opinions."
        />
        <meta property="og:title" content="Attila Györffy" />
        <meta property="og:description" content="Software engineer, lifelong learner, and maker of puns. Building things with Go, Ruby, and Rails. Writing, photography, open source projects, and dry opinions." />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://www.attilagyorffy.com/" />
        <meta property="og:image" content="https://www.attilagyorffy.com/images/og-default.png" />
        <meta property="og:site_name" content="Attila Györffy" />
        <meta property="og:locale" content="en_GB" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:creator" content="@attilagyorffy" />
        <link
            rel="icon"
            type="image/svg+xml"
            id="favicon"
            href="images/favicon-active.svg"
        />
        <link rel="preload" href="/fonts/ibm-plex-mono.woff2" as="font" type="font/woff2" crossorigin />
        <link rel="stylesheet" href="/stylesheets/tokens.css" />
        <link rel="stylesheet" href="/stylesheets/fonts.css" />
        <link rel="stylesheet" href="/stylesheets/reset.css" />
        <link rel="stylesheet" href="/stylesheets/layout.css" />
        <link rel="stylesheet" href="/stylesheets/theme.css" />
        <script>if(!window.matchMedia('(prefers-reduced-motion:reduce)').matches)document.documentElement.classList.add('js-animated')</script>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }
            .page {
                max-width: clamp(22rem, 55vi, 100rem);
            }
            .intro {
                max-inline-size: 34ch;
                text-wrap: pretty;
            }
            @media (min-width: 541px) {
                .page { text-align: center; }
                .intro { margin-inline: auto; }
            }
            h1 {
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            .page a {
                color: var(--color-accent);
                border-bottom: 1px dotted var(--color-subtle);
                padding-bottom: 2px;
                transition: border-color 0.2s ease;
            }
            .page a:hover {
                border-bottom-color: var(--color-heading);
            }
            .js-animated h1 {
                opacity: 0;
                animation: fadeInUp 0.8s ease-out 0.7s forwards;
            }
            .js-animated .intro {
                opacity: 0;
                animation: fadeInUp 0.8s ease-out forwards;
            }
            .js-animated .intro:nth-of-type(1) {
                animation-delay: 0.9s;
            }
            .js-animated .intro:nth-of-type(2) {
                animation-delay: 1.1s;
            }
            .intro + .intro {
                margin-top: calc(-1 * var(--space-l));
            }
            .trivia-line {
                display: block;
                min-height: 1.4em;
                margin-top: var(--space-xs);
            }
            #trivia-text {
                will-change: contents;
                transform: translateZ(0);
                backface-visibility: hidden;
            }
            .cursor {
                opacity: 0;
                will-change: opacity;
                transform: translateZ(0);
            }
            @keyframes blink {
                0% { opacity: 0; }
                15% { opacity: 1; }
                65% { opacity: 1; }
                100% { opacity: 0; }
            }
        </style>
    </head>
    <body>
        <main class="page" itemscope itemtype="https://schema.org/Person">
            <h1 itemprop="name">Attila Györffy</h1>
            <p class="intro" itemprop="description">
                Lifelong learner software engineer with the
                <a href="/about/">scout mindset</a>.
                <span class="trivia-line"
                    ><span id="trivia-text">Partially Scandinavian.</span
                    ><span id="cursor" class="cursor">|</span></span
                >
            </p>
            <p class="intro">
                I sometimes
                <a href="/blog/">rant and write</a>, have
                <a href="/thoughts/">opinions</a>, take
                <a href="/photos/">photos</a>, maintain a few
                <a href="/projects/">open source projects</a>, and have
                a <a href="/cv/">CV</a>.
            </p>
        </main>

        <script src="/javascripts/favicon.js" defer></script>
        <script>
            // Hardware-accelerated animated typing effect for trivia text
            const triviaTexts = [
                "Partially Scandinavian.",
                "Maker of puns.",
                "Budapest based.",
                "Has a distinctive laugh.",
                "Keeps a homelab humming.",
                "Was on Last.fm before you.",
                "Learning Rust.",
                "Wrote code for the UK government. It worked.",
                "Deployed one of Hungary's first Rails apps.",
                "20+ years of shipping software.",
                "Builds audio apps for local music.",
                "Knows what OPNsense is. Voluntarily.",
                "Runs Prometheus at home. On purpose.",
                "Has opinions about monorepos.",
                "Built self-healing systems. Still working on that personally.",
                "Once worked for a company that recycled everything except the codebase.",
            ];

            for (let i = triviaTexts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [triviaTexts[i], triviaTexts[j]] = [
                    triviaTexts[j],
                    triviaTexts[i],
                ];
            }

            const mid = Math.floor(triviaTexts.length / 2);
            triviaTexts.splice(
                mid,
                0,
                "Is anyone reading these anyway?",
                "Hello? ...Just me?",
                "Anyway. There's more.",
            );

            const triviaElement = document.getElementById("trivia-text");
            let currentIndex = -1;
            let isDeleting = false;
            let currentText = triviaElement.textContent;
            let displayedText = triviaElement.textContent;
            const typingSpeed = 100; // ms per character when typing
            const deletingSpeed = 50; // ms per character when deleting
            const pauseBeforeDelete = 3500; // ms to pause before starting to delete
            const pauseBeforeType = 1200; // ms to pause before starting to type new text

            let lastUpdateTime = 0;
            let animationStartTime = 0;
            let isPaused = false;
            let pauseDuration = 0;

            function updateTrivia(timestamp) {
                if (animationStartTime === 0) {
                    animationStartTime = timestamp;
                }

                const elapsed = timestamp - lastUpdateTime;

                if (isPaused) {
                    if (elapsed >= pauseDuration) {
                        isPaused = false;
                        lastUpdateTime = timestamp;
                    }
                    requestAnimationFrame(updateTrivia);
                    return;
                }

                const speed = isDeleting ? deletingSpeed : typingSpeed;

                if (elapsed >= speed) {
                    if (!isDeleting) {
                        // Typing mode - add characters
                        if (displayedText.length < currentText.length) {
                            displayedText = currentText.substring(
                                0,
                                displayedText.length + 1,
                            );
                            triviaElement.textContent = displayedText;
                            lastUpdateTime = timestamp;
                        } else {
                            // Finished typing, wait before deleting
                            isPaused = true;
                            pauseDuration = pauseBeforeDelete;
                            isDeleting = true;
                            lastUpdateTime = timestamp;
                        }
                    } else {
                        // Deleting mode - remove characters
                        if (displayedText.length > 0) {
                            displayedText = displayedText.substring(
                                0,
                                displayedText.length - 1,
                            );
                            triviaElement.textContent = displayedText;
                            lastUpdateTime = timestamp;
                        } else {
                            // Finished deleting, move to next text
                            isPaused = true;
                            pauseDuration = pauseBeforeType;
                            isDeleting = false;
                            currentIndex =
                                (currentIndex + 1) % triviaTexts.length;
                            currentText = triviaTexts[currentIndex];
                            lastUpdateTime = timestamp;
                        }
                    }
                }

                requestAnimationFrame(updateTrivia);
            }

            // Show cursor early
            setTimeout(() => {
                const cursor = document.getElementById("cursor");
                cursor.style.opacity = "1";
                cursor.style.animation = "blink 1.6s ease-in-out infinite";
            }, 8000); // Wait 8 seconds after page load

            // Start trivia cycling later
            setTimeout(() => {
                requestAnimationFrame(updateTrivia);
            }, 12000); // Wait 12 seconds after page load
        </script>
    </body>
</html>
